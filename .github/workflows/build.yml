name: NodeJS with jest test

on:
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest

    # กำหนดให้ทุกคำสั่ง 'run' ทำงานในโฟลเดอร์ jestway โดยอัตโนมัติ
    defaults:
      run:
        working-directory: ./jestway

    strategy:
      matrix:
        node-version: [24.x]

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: |
        npm install
        npm audit fix --force

    - name: Run Test
      # ใช้ npx เพื่อช่วยรัน jest ป้องกันปัญหาเรื่อง permission ของไฟล์ binary
      run: npx jest
        
